<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 40px;}
        label, select, input, button {margin: 5px 0; display: block;}
    </style>
</head>
<body>
    <h1>RMB Currency Converter</h1>
    <label for="amount">Amount (CNY):</label>
    <input type="number" id="amount" step="0.01" value="1">

    <label for="currency">Target Currency:</label>
    <select id="currency">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="JPY">JPY</option>
        <option value="GBP">GBP</option>
    </select>

    <button id="convert">Convert</button>

    <h2 id="result"></h2>

    <script>
        async function convert() {
            const amount = document.getElementById('amount').value;
            const currency = document.getElementById('currency').value;
            const resultElem = document.getElementById('result');
            resultElem.textContent = 'Converting...';

            // Fallback rates (approximate) in case the online request fails
            const fallback = {
                USD: 0.14,
                EUR: 0.13,
                JPY: 22,
                GBP: 0.11
            };

            try {
                const response = await fetch(`https://api.exchangerate.host/convert?from=CNY&to=${currency}&amount=${amount}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                resultElem.textContent = `${amount} CNY = ${data.result} ${currency}`;
            } catch (err) {
                // Use fallback rate if available
                if (currency in fallback) {
                    const result = amount * fallback[currency];
                    resultElem.textContent = `${amount} CNY ≈ ${result} ${currency} (offline rate)`;
                } else {
                    resultElem.textContent = 'Failed to fetch exchange rate.';
                }
            }
        }
        document.getElementById('convert').addEventListener('click', convert);
    </script>
</body>
</html>
